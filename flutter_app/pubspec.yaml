name: tam_flutter
description: TAM taxi app — Flutter port (iOS + Android). Firebase RTDB parity with tam/ Expo app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.2
  firebase_core: ^3.8.1
  firebase_database: ^11.2.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  google_maps_flutter: ^2.10.0
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/rwanda_destinations.json
